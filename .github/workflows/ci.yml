name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [web-backend, git-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint --if-present
      - name: Test (with coverage)
        run: npm run test:coverage --if-present
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage
          if-no-files-found: ignore
      - name: SCA (npm audit)
        run: npm audit --audit-level=high || true

  frontend:
    name: frontend (web-frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: SCA (npm audit)
        run: npm audit --audit-level=high || true

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Use the gitleaks CLI directly instead of gitleaks/gitleaks-action@v2, which now
      # requires a paid license unless it can verify the account is an individual via the
      # GitHub API — that verification fails on API rate limits and breaks CI. The CLI is
      # license-free and scans the full git history the same way.
      - name: Run gitleaks (CLI)
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
