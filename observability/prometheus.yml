# Prometheus scrape config for CodeVault.
# Both backends expose Prometheus metrics:
#   web-backend  -> /api/metrics
#   git-service  -> /metrics
# Load the alert rules alongside this file (see alerts.yml).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: web-backend
    metrics_path: /api/metrics
    static_configs:
      - targets: ["web-backend:4000"]

  - job_name: git-service
    metrics_path: /metrics
    static_configs:
      - targets: ["git-service:5050"]
