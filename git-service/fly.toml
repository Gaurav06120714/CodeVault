# CodeVault git-service — Fly.io. See docs/DEPLOY.md.
app = "codevault-git"
primary_region = "iad"

[build]

[http_service]
  internal_port = 5050
  force_https = true
  # Always-on: the extension pushes captures here anytime + node-cron runs scheduled syncs.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[env]
  PORT = "5050"
  NODE_ENV = "production"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
